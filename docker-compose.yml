services:
  rails:
    image: chatwoot/chatwoot:latest
    pull_policy: always
    volumes:
      - chatwoot_storage:/app/storage
    ports:
      - "${CHATWOOT_RAILS_HOST_PORT:-3003}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    restart: unless-stopped
    networks:
      - internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  sidekiq:
    image: chatwoot/chatwoot:latest
    pull_policy: always
    volumes:
      - chatwoot_storage:/app/storage
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    restart: unless-stopped
    networks:
      - internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - chatwoot_postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: chatwoot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_stat_statements
      - -c
      - shared_buffers=2GB
      - -c
      - effective_cache_size=6GB
      - -c
      - work_mem=32MB
      - -c
      - maintenance_work_mem=512MB
      - -c
      - max_connections=200
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - wal_buffers=16MB
      - -c
      - max_wal_size=2GB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - default_statistics_target=200
      - -c
      - jit=off
      - -c
      - pg_stat_statements.track=all
      - -c
      - log_checkpoints=off
      - -c
      - log_min_messages=warning
      - -c
      - log_connections=off
      - -c
      - log_disconnections=off
    networks:
      - internal
    ports:
      - "${CHATWOOT_POSTGRES_HOST_PORT:-5439}:5432"
  redis:
    image: redis:alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\" --loglevel warning"]
    env_file:
      - .env
    volumes:
      - chatwoot_redis:/data
    networks:
      - internal

  evolution-api:
    image: evoapicloud/evolution-api:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${EVOLUTION_API_HOST_PORT:-8082}:8080"
    env_file:
      - evolution.env
    environment:
      RABBITMQ_ENABLED: "false"
      RABBITMQ_GLOBAL_ENABLED: "false"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  evolution-manager:
    image: evoapicloud/evolution-manager:latest
    pull_policy: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    ports:
      - "${EVOLUTION_MANAGER_HOST_PORT:-3010}:80"
    networks:
      - internal
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sed -i 's/ must-revalidate//g; s|access_log .*|access_log off;|g' /etc/nginx/conf.d/nginx.conf && exec nginx -g "daemon off;"

  evolution-redis:
    image: redis:alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--loglevel", "warning"]
    volumes:
      - evolution_redis:/data
    networks:
      - internal

  widget-test:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${WIDGET_TEST_HOST_PORT:-3333}:80"
    volumes:
      - ./widget-test:/usr/share/nginx/html:ro
    networks:
      - internal

  evolution-postgres:
    image: postgres:15
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=1000
      - -c
      - listen_addresses=*
      - -c
      - log_checkpoints=off
      - -c
      - log_min_messages=warning
      - -c
      - log_connections=off
      - -c
      - log_disconnections=off
    environment:
      POSTGRES_DB: ${EVOLUTION_POSTGRES_DATABASE}
      POSTGRES_USER: ${EVOLUTION_POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD}
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  chatwoot_storage:
  chatwoot_postgres:
  chatwoot_redis:
  evolution_instances:
  evolution_redis:
  evolution_postgres:
