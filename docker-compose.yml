services:
  rails:
    image: chatwoot/chatwoot:latest
    pull_policy: always
    volumes:
      - chatwoot_storage:/app/storage
    depends_on:
      - postgres
      - redis
    ports:
      - "${CHATWOOT_RAILS_HOST_PORT:-3003}:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    entrypoint: docker/entrypoints/rails.sh
    command: ["bundle", "exec", "rails", "s", "-p", "3000", "-b", "0.0.0.0"]
    restart: unless-stopped
    networks:
      - internal

  sidekiq:
    image: chatwoot/chatwoot:latest
    pull_policy: always
    volumes:
      - chatwoot_storage:/app/storage
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - RAILS_ENV=production
      - INSTALLATION_ENV=docker
    command: ["bundle", "exec", "sidekiq", "-C", "config/sidekiq.yml"]
    restart: unless-stopped
    networks:
      - internal

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    volumes:
      - chatwoot_postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: chatwoot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - internal
    ports:
      - "${CHATWOOT_POSTGRES_HOST_PORT:-5439}:5432"
  redis:
    image: redis:alpine
    restart: unless-stopped
    command: ["sh", "-c", "redis-server --requirepass \"$REDIS_PASSWORD\""]
    env_file:
      - .env
    volumes:
      - chatwoot_redis:/data
    networks:
      - internal

  evolution-api:
    image: evoapicloud/evolution-api:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      evolution-redis:
        condition: service_started
      evolution-postgres:
        condition: service_started
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    ports:
      - "${EVOLUTION_API_HOST_PORT:-8081}:8080"
    env_file:
      - evolution.env
    environment:
      RABBITMQ_ENABLED: "true"
      RABBITMQ_GLOBAL_ENABLED: "true"
      RABBITMQ_URI: ${RABBITMQ_URI:-amqp://guest:guest@rabbitmq:5672}
      WEBHOOK_GLOBAL_ENABLED: "false"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - internal

  evolution-manager:
    image: evoapicloud/evolution-manager:latest
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${EVOLUTION_MANAGER_HOST_PORT:-3001}:80"
    networks:
      - internal
    entrypoint: ["/bin/sh", "-c"]
    command:
      - sed -i 's/ must-revalidate//g' /etc/nginx/conf.d/nginx.conf && echo "Starting Evolution Manager v2..." && exec nginx -g "daemon off;"

  evolution-redis:
    image: redis:alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - evolution_redis:/data
    networks:
      - internal

  rabbitmq:
    image: rabbitmq:3-management-alpine
    pull_policy: always
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_HOST_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal

  widget-test:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${WIDGET_TEST_HOST_PORT:-3333}:80"
    volumes:
      - ./widget-test:/usr/share/nginx/html:ro
    networks:
      - internal

  evolution-postgres:
    image: postgres:15
    restart: unless-stopped
    command:
      - postgres
      - -c
      - max_connections=1000
      - -c
      - listen_addresses=*
    environment:
      POSTGRES_DB: ${EVOLUTION_POSTGRES_DATABASE}
      POSTGRES_USER: ${EVOLUTION_POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD}
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  chatwoot_storage:
  chatwoot_postgres:
  chatwoot_redis:
  evolution_instances:
  evolution_redis:
  evolution_postgres:
  rabbitmq_data:
